name = "cloudflare-firewall-manager"
main = "src/worker/index.ts"
compatibility_date = "2024-02-01"
workers_dev = false

[vars]
# BEARER_TOKEN = ""  # Set as secret: wrangler secret put BEARER_TOKEN
CORS_ORIGIN = "https://firewall.bozza.au"  # Production domain
ACCOUNT_ID = "0b0ee2b5eaf1fb8a2612e40ab6488052"  # Your Cloudflare account ID
ORGANIZATION_ID = ""  # Your Zero Trust organization ID
TARGET_GROUP = ""  # Optional: group to flag for special attention
DEBUG = "false"  # Set to "true" to enable debug page

# KV namespace for theme storage
[[kv_namespaces]]
binding = "IDENTITY_DYNAMIC_THEME_STORE"
id = "874ed0b066ac4df3b2200c888ff3b86b"

# Routes configuration
[[routes]]
pattern = "firewall.bozza.au/*"  # Production domain
zone_id = "7249ad638510c628a7861d93535acbca"  # Your zone ID

[build]
command = "npm run build:worker"

# Development configuration
[dev]
port = 8787
local_protocol = "http"
