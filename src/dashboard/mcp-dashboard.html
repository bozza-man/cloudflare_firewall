<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Server Dashboard - Cloudflare Firewall Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #718096;
            font-size: 14px;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #48bb78;
        }

        .status-indicator.disconnected {
            background: #f56565;
        }

        .status-indicator.partial {
            background: #ed8936;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }

        .category-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .category-security { background: #fed7d7; color: #c53030; }
        .category-workers { background: #e6fffa; color: #00835a; }
        .category-observability { background: #e9d8fd; color: #6b46c1; }
        .category-analytics { background: #bee3f8; color: #2c5282; }
        .category-utilities { background: #feebc8; color: #c05621; }
        .category-docs { background: #c6f6d5; color: #22543d; }

        .server-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-dot.online { background: #48bb78; }
        .status-dot.offline { background: #f56565; }
        .status-dot.connecting { background: #ed8936; animation: pulse 1s infinite; }

        .server-info {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-label {
            color: #718096;
        }

        .info-value {
            color: #2d3748;
            font-weight: 500;
        }

        .features-list {
            margin-top: 15px;
            max-height: 100px;
            overflow-y: auto;
        }

        .feature-item {
            font-size: 12px;
            color: #718096;
            padding: 3px 0;
            border-left: 2px solid #e2e8f0;
            padding-left: 10px;
            margin-bottom: 5px;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .metrics-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .metric-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .metric-value {
            font-size: 32px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 14px;
            color: #718096;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
            background: #5a67d8;
        }

        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #feb2b2;
            color: #c53030;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #9ae6b4;
            color: #22543d;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 MCP Server Dashboard</h1>
            <p class="subtitle">Real-time monitoring of Cloudflare MCP server connections</p>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-indicator connected" id="overall-status"></div>
                    <span id="overall-text">Checking status...</span>
                </div>
                <div class="status-item">
                    <span id="connected-count">0/0</span> servers connected
                </div>
                <div class="status-item">
                    <span>Last updated: <span id="last-update">Never</span></span>
                </div>
            </div>
        </header>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <div class="dashboard-grid" id="servers-grid">
            <!-- Server cards will be dynamically inserted here -->
        </div>

        <div class="metrics-container">
            <h2 class="card-title">System Metrics</h2>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-value" id="total-servers">0</div>
                    <div class="metric-label">Total Servers</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="active-connections">0</div>
                    <div class="metric-label">Active Connections</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="health-score">0%</div>
                    <div class="metric-label">Health Score</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="api-calls">0</div>
                    <div class="metric-label">API Calls Today</div>
                </div>
            </div>
        </div>

        <button class="refresh-btn" id="refresh-btn" onclick="refreshDashboard()">
            ↻
        </button>
    </div>

    <script>
        // MCP Server Configuration
        const MCP_SERVERS = {
            docs: { name: 'Documentation', category: 'docs', url: 'https://docs.mcp.cloudflare.com/sse' },
            bindings: { name: 'Workers Bindings', category: 'workers', url: 'https://bindings.mcp.cloudflare.com/sse' },
            builds: { name: 'Workers Builds', category: 'workers', url: 'https://builds.mcp.cloudflare.com/sse' },
            containers: { name: 'Container', category: 'workers', url: 'https://containers.mcp.cloudflare.com/sse' },
            observability: { name: 'Observability', category: 'observability', url: 'https://observability.mcp.cloudflare.com/sse' },
            logpush: { name: 'Logpush', category: 'observability', url: 'https://logs.mcp.cloudflare.com/sse' },
            radar: { name: 'Radar', category: 'security', url: 'https://radar.mcp.cloudflare.com/sse' },
            aiGateway: { name: 'AI Gateway', category: 'security', url: 'https://ai-gateway.mcp.cloudflare.com/sse' },
            auditLogs: { name: 'Audit Logs', category: 'security', url: 'https://auditlogs.mcp.cloudflare.com/sse' },
            casb: { name: 'CASB', category: 'security', url: 'https://casb.mcp.cloudflare.com/sse' },
            dnsAnalytics: { name: 'DNS Analytics', category: 'analytics', url: 'https://dns-analytics.mcp.cloudflare.com/sse' },
            dex: { name: 'DEM', category: 'analytics', url: 'https://dex.mcp.cloudflare.com/sse' },
            graphql: { name: 'GraphQL', category: 'analytics', url: 'https://graphql.mcp.cloudflare.com/sse' },
            browserRendering: { name: 'Browser Rendering', category: 'utilities', url: 'https://browser.mcp.cloudflare.com/sse' },
            autorag: { name: 'AutoRAG', category: 'utilities', url: 'https://autorag.mcp.cloudflare.com/sse' }
        };

        // Dashboard state
        let dashboardData = {
            servers: {},
            metrics: {
                total: 0,
                connected: 0,
                healthScore: 0,
                apiCalls: 0
            }
        };

        // Initialize dashboard
        async function initDashboard() {
            console.log('Initializing MCP Dashboard...');
            renderServerCards();
            await refreshDashboard();
            // Auto-refresh every 30 seconds
            setInterval(refreshDashboard, 30000);
        }

        // Render server cards
        function renderServerCards() {
            const grid = document.getElementById('servers-grid');
            grid.innerHTML = '';

            Object.entries(MCP_SERVERS).forEach(([key, server]) => {
                const card = createServerCard(key, server);
                grid.appendChild(card);
            });
        }

        // Create server card element
        function createServerCard(key, server) {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `server-${key}`;
            
            card.innerHTML = `
                <div class="card-header">
                    <h3 class="card-title">${server.name}</h3>
                    <span class="category-badge category-${server.category}">${server.category}</span>
                </div>
                <div class="server-status">
                    <div class="status-dot offline" id="status-${key}"></div>
                    <span id="status-text-${key}">Checking...</span>
                </div>
                <div class="server-info">
                    <div class="info-row">
                        <span class="info-label">URL:</span>
                        <span class="info-value" style="font-size: 11px;">${server.url}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Last Check:</span>
                        <span class="info-value" id="last-check-${key}">Never</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Response Time:</span>
                        <span class="info-value" id="response-time-${key}">-</span>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="testServer('${key}')">Test</button>
                    <button class="btn btn-secondary" onclick="viewLogs('${key}')">Logs</button>
                </div>
            `;
            
            return card;
        }

        // Refresh dashboard data
        async function refreshDashboard() {
            const refreshBtn = document.getElementById('refresh-btn');
            refreshBtn.classList.add('spinning');
            
            try {
                // Fetch status from backend API
                const response = await fetch('/api/mcp/status');
                const data = await response.json();
                
                updateDashboard(data);
                showSuccess('Dashboard refreshed successfully');
            } catch (error) {
                console.error('Failed to fetch MCP status:', error);
                // Use mock data for demonstration
                updateDashboardWithMockData();
            } finally {
                refreshBtn.classList.remove('spinning');
                updateLastUpdateTime();
            }
        }

        // Update dashboard with real data
        function updateDashboard(data) {
            dashboardData = data;
            
            // Update server statuses
            Object.entries(data.servers).forEach(([key, status]) => {
                updateServerStatus(key, status);
            });
            
            // Update metrics
            updateMetrics(data.metrics);
            
            // Update overall status
            updateOverallStatus(data.metrics);
        }

        // Update dashboard with mock data (for demonstration)
        function updateDashboardWithMockData() {
            const mockData = {
                servers: {},
                metrics: {
                    total: Object.keys(MCP_SERVERS).length,
                    connected: 0,
                    healthScore: 0,
                    apiCalls: Math.floor(Math.random() * 10000)
                }
            };
            
            // Generate random status for each server
            Object.keys(MCP_SERVERS).forEach(key => {
                const isConnected = Math.random() > 0.3;
                mockData.servers[key] = {
                    connected: isConnected,
                    lastCheck: new Date().toISOString(),
                    responseTime: isConnected ? Math.floor(Math.random() * 500) + 50 : null,
                    failureCount: isConnected ? 0 : Math.floor(Math.random() * 5)
                };
                
                if (isConnected) mockData.metrics.connected++;
            });
            
            mockData.metrics.healthScore = Math.round((mockData.metrics.connected / mockData.metrics.total) * 100);
            
            updateDashboard(mockData);
        }

        // Update individual server status
        function updateServerStatus(key, status) {
            const statusDot = document.getElementById(`status-${key}`);
            const statusText = document.getElementById(`status-text-${key}`);
            const lastCheck = document.getElementById(`last-check-${key}`);
            const responseTime = document.getElementById(`response-time-${key}`);
            
            if (!statusDot) return;
            
            if (status.connected) {
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Connected';
                responseTime.textContent = `${status.responseTime}ms`;
            } else {
                statusDot.className = 'status-dot offline';
                statusText.textContent = `Disconnected (${status.failureCount} failures)`;
                responseTime.textContent = '-';
            }
            
            lastCheck.textContent = new Date(status.lastCheck).toLocaleTimeString();
        }

        // Update metrics display
        function updateMetrics(metrics) {
            document.getElementById('total-servers').textContent = metrics.total;
            document.getElementById('active-connections').textContent = metrics.connected;
            document.getElementById('health-score').textContent = `${metrics.healthScore}%`;
            document.getElementById('api-calls').textContent = metrics.apiCalls.toLocaleString();
        }

        // Update overall status indicator
        function updateOverallStatus(metrics) {
            const indicator = document.getElementById('overall-status');
            const text = document.getElementById('overall-text');
            const count = document.getElementById('connected-count');
            
            count.textContent = `${metrics.connected}/${metrics.total}`;
            
            if (metrics.healthScore >= 80) {
                indicator.className = 'status-indicator connected';
                text.textContent = 'All systems operational';
            } else if (metrics.healthScore >= 50) {
                indicator.className = 'status-indicator partial';
                text.textContent = 'Partial connectivity';
            } else {
                indicator.className = 'status-indicator disconnected';
                text.textContent = 'Connection issues detected';
            }
        }

        // Update last update time
        function updateLastUpdateTime() {
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }

        // Test individual server
        async function testServer(key) {
            const server = MCP_SERVERS[key];
            showSuccess(`Testing connection to ${server.name}...`);
            
            // Simulate test
            setTimeout(() => {
                const success = Math.random() > 0.2;
                if (success) {
                    showSuccess(`${server.name} is responding normally`);
                } else {
                    showError(`Failed to connect to ${server.name}`);
                }
                refreshDashboard();
            }, 1000);
        }

        // View server logs
        function viewLogs(key) {
            const server = MCP_SERVERS[key];
            showSuccess(`Opening logs for ${server.name}...`);
            // In a real implementation, this would open a log viewer
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
