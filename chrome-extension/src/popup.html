<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway Log Streamer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    
    .container {
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .logo {
      width: 32px;
      height: 32px;
      margin-right: 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .status-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    
    .status-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .status-label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 2s infinite;
    }
    
    .status-dot.active {
      background: #10b981;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status-text {
      font-size: 12px;
      font-weight: 500;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    
    .stat-label {
      font-size: 11px;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .config-section {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }
    
    .config-header {
      font-size: 14px;
      margin-bottom: 12px;
      opacity: 0.9;
    }
    
    .input-group {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .input-group label {
      font-size: 12px;
      min-width: 80px;
    }
    
    .input-group input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 12px;
    }
    
    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    
    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    
    .checkbox-group label {
      font-size: 12px;
    }
    
    .action-buttons {
      display: flex;
      gap: 10px;
    }
    
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    
    .btn-primary {
      background: rgba(255, 255, 255, 0.9);
      color: #764ba2;
    }
    
    .btn-primary:hover {
      background: #fff;
      transform: translateY(-1px);
    }
    
    .btn-primary.active {
      background: #ef4444;
      color: #fff;
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .info-section {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 11px;
      opacity: 0.8;
      text-align: center;
    }
    
    .info-section a {
      color: #fff;
      text-decoration: underline;
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      margin-bottom: 10px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🛡️</div>
      <h1>Gateway Log Streamer</h1>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div class="status-card">
      <div class="status-header">
        <span class="status-label">Extension Status</span>
        <div class="status-indicator">
          <div class="status-dot" id="extensionStatusDot"></div>
          <span class="status-text" id="extensionStatus">Not Active</span>
        </div>
      </div>
      
      <div class="status-header">
        <span class="status-label">WebSocket Connection</span>
        <div class="status-indicator">
          <div class="status-dot" id="wsStatusDot"></div>
          <span class="status-text" id="wsStatus">Disconnected</span>
        </div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="logCount">0</div>
          <div class="stat-label">Logs Sent</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="errorCount">0</div>
          <div class="stat-label">Errors</div>
        </div>
      </div>
    </div>

    <div class="config-section">
      <div class="config-header">Configuration</div>
      
      <div class="input-group">
        <label>WS Port:</label>
        <input type="number" id="wsPort" placeholder="8081" value="8081" min="1" max="65535">
      </div>
      
      <div class="input-group">
        <label>Refresh (s):</label>
        <input type="number" id="refreshInterval" placeholder="30" value="30" min="5" max="300">
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="autoStart">
        <label for="autoStart">Auto-start on Gateway logs page</label>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn btn-primary" id="toggleBtn">Start Monitoring</button>
      <button class="btn btn-secondary" id="openDashboard">Dashboard</button>
    </div>

    <div class="info-section">
      <p>Navigate to your Cloudflare Zero Trust Gateway logs page to start capturing activity.</p>
      <p style="margin-top: 8px;">
        <a href="#" id="helpLink">Help</a> • 
        <a href="#" id="settingsLink">Advanced Settings</a>
      </p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
